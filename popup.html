<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    /* === 这里是瘦身后的样式 === */
    body { 
      width: 250px; /* 宽度设为250，小巧适中 */
      padding: 12px; 
      font-family: 'Segoe UI', Tahoma, sans-serif; 
      background-color: #f4f6f8;
      margin: 0; /* 去掉默认边距 */
    }

    /* 标题样式 */
    h3 { 
      margin: 0 0 10px 0; 
      text-align: center; 
      color: #333; 
      font-size: 14px; 
      border-bottom: 1px solid #e0e0e0; 
      padding-bottom: 8px;
    }

    /* 每个功能块的样式 */
    .control-group { 
      margin-bottom: 10px; 
      background: #fff; 
      padding: 8px; 
      border-radius: 6px; 
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
    }

    label { 
      display: block; 
      font-weight: bold; 
      margin-bottom: 5px; 
      font-size: 11px; 
      color: #555;
    }

    /* 下拉菜单 */
    select { 
      width: 100%; 
      padding: 5px; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
      background: white; 
      font-size: 11px; 
      cursor: pointer;
    }

    /* 输入框 */
    textarea { 
      width: 100%; 
      height: 60px; /* 高度适中 */
      padding: 5px; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
      box-sizing: border-box; 
      font-size: 11px; 
      resize: none; /* 禁止拖动大小 */
    }
    textarea:focus { outline: none; border-color: #2196F3; }

    /* 按钮 */
    button { 
      width: 100%; 
      padding: 8px; 
      background-color: #ff4757; 
      color: white; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 12px; 
      font-weight: bold; 
      transition: 0.2s;
    }
    button:hover { background-color: #ff6b81; }

    /* 状态文字 */
    #status { margin-top: 8px; font-size: 10px; color: #2ed573; text-align: center; min-height: 14px; }
    .note { font-size: 10px; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <h3 data-i18n="uiTitle">Settings</h3>

  <div class="control-group">
    <label data-i18n="uiSwitchLabel">Status</label>
    <select id="switch">
      <option value="true" data-i18n="uiSwitchOn">ON</option>
      <option value="false" data-i18n="uiSwitchOff">OFF</option>
    </select>
  </div>

  <div class="control-group">
    <label data-i18n="uiModeLabel">Intensity</label>
    <select id="mode">
      <option value="super" data-i18n="uiModeSuper">Super</option>
      <option value="space" data-i18n="uiModeSpace">Space</option>
      <option value="mask" data-i18n="uiModeMask">Mask</option>
      <option value="blur" data-i18n="uiModeBlur">Blur</option>
      <option value="red" data-i18n="uiModeRed">Red</option>
    </select>
  </div>

  <div class="control-group">
    <label data-i18n="uiKeywordLabel">Keywords</label>
    <textarea id="userKeywords" placeholder="..."></textarea>
    <div class="note" data-i18n="uiNote">* Note</div>
  </div>

  <button id="save" data-i18n="btnSave">Save</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
